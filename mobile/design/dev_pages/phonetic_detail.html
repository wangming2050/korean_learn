<meta charset="utf-8">


<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
.outer{display:flex;gap:20px;align-items:flex-start;justify-content:center;padding:16px 8px;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;}
.phone{width:320px;height:680px;background:#F4FAF7;border-radius:40px;border:1.5px solid #C8E8D8;overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 16px 48px rgba(26,44,36,0.14);}
.screen{width:100%;height:100%;position:relative;overflow:hidden;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;background:#F4FAF7;will-change:transform,opacity;}
.topbar{height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-back{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.7);border:1px solid #C8E8D8;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.tb-counter{font-size:14px;font-weight:600;color:#0F6E56;background:rgba(255,255,255,0.7);border:1px solid #C8E8D8;padding:5px 14px;border-radius:20px;}
.tb-right{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.7);border:1px solid #C8E8D8;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.content-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px 12px;cursor:pointer;}
.phonetic-glyph{font-size:104px;font-weight:300;color:#0A3D2B;font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;line-height:1;text-align:center;margin-bottom:16px;letter-spacing:-3px;}
.phonetic-name-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.phonetic-roman{font-size:20px;font-weight:600;color:#0F6E56;letter-spacing:0.5px;}
.phonetic-tags{display:flex;gap:6px;}
.ptag{font-size:11px;color:#0F6E56;background:#E1F5EE;border:1px solid #9FE1CB;padding:3px 10px;border-radius:20px;font-weight:500;}
.tip-block{width:100%;background:#fff;border:1px solid #D9EFDF;border-radius:14px;padding:14px 16px;}
.tip-row{display:flex;align-items:flex-start;gap:10px;}
.tip-icon{width:28px;height:28px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tip-title{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:5px;}
.tip-text{font-size:13px;color:#3A6654;line-height:1.65;}
.tip-extra{margin-top:10px;padding-top:10px;border-top:1px solid #EEF7F2;font-size:12px;color:#5A8A72;line-height:1.6;}
.tip-extra span{display:inline-block;background:#F4FAF7;border:1px solid #D9EFDF;border-radius:6px;padding:2px 8px;margin:2px 3px 2px 0;font-weight:500;color:#0F6E56;font-size:12px;}
.score-area{display:flex;align-items:center;gap:12px;margin-top:16px;width:100%;}
.score-ring-wrap{width:54px;height:54px;flex-shrink:0;}
.score-ring-wrap svg{width:54px;height:54px;}
.score-label{font-size:12px;color:#90A89C;}
.score-hint{font-size:11px;color:#B0C8BC;margin-top:2px;line-height:1.4;}
.wave-area{width:100%;display:flex;align-items:center;justify-content:center;gap:2.5px;height:38px;margin-top:16px;}
.wave-bar{width:3px;border-radius:2px;background:#9FE1CB;flex-shrink:0;}
.wave-bar.played{background:#1D9E75;}
.wave-hint{font-size:11px;color:#90A89C;text-align:center;margin-top:6px;}
.assoc-tag{font-size:12px;color:#0F6E56;background:#E1F5EE;border:1px solid #9FE1CB;padding:4px 14px;border-radius:20px;margin-bottom:24px;}
.vocab-kr{font-size:52px;font-weight:700;color:#0A3D2B;font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;line-height:1.1;text-align:center;margin-bottom:10px;letter-spacing:-1px;}
.vocab-zh{font-size:20px;font-weight:600;color:#1A2C24;text-align:center;margin-bottom:4px;}
.vocab-roman{font-size:13px;color:#5A8A72;text-align:center;letter-spacing:0.3px;margin-bottom:24px;}
.bottom-actions{height:72px;padding:0 20px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-solid{flex:1;height:46px;border-radius:13px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;font-family:inherit;}
.nav-dots{position:absolute;right:13px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;align-items:center;}
.dot{width:4px;border-radius:2px;background:#C8E8D8;transition:all 0.2s;}
.dot.active{height:14px;background:#1D9E75;}
.dot:not(.active){height:4px;}
.toast{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);background:#0A3D2B;color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;}
</style>

<div class="outer">
<div class="phone">
  <div class="screen" id="screen">

    <div class="page" id="phoneticPage">
      <div class="topbar">
        <div class="tb-back" onclick="goBack()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="tb-counter" id="phCounter">ㄴ · 辅音 2/4</div>
        <div class="tb-right" onclick="toggleStar()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" id="starIcon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
      </div>

      <div class="content-area" onclick="replayAudio()" id="phContent">
        <div class="phonetic-glyph" id="phGlyph">ㄴ</div>
        <div class="phonetic-name-row">
          <span class="phonetic-roman" id="phRoman">nieun</span>
          <div class="phonetic-tags" id="phTags">
            <span class="ptag">松音</span><span class="ptag">鼻音</span>
          </div>
        </div>

        <div class="tip-block">
          <div class="tip-row">
            <div class="tip-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div>
              <div class="tip-title" id="phTipTitle">发音技巧</div>
              <div class="tip-text" id="phTipText">舌尖抵住上齿龈，气流从鼻腔自然流出，不爆破。</div>
              <div class="tip-extra" id="phTipExtra">常见词：<span>나무</span><span>눈</span><span>남자</span></div>
            </div>
          </div>
        </div>

        <div class="score-area">
          <div class="score-ring-wrap">
            <svg viewBox="0 0 54 54">
              <circle cx="27" cy="27" r="22" fill="none" stroke="#E1F5EE" stroke-width="3.5"/>
              <circle cx="27" cy="27" r="22" fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-dasharray="138.2" stroke-dashoffset="138.2" stroke-linecap="round" transform="rotate(-90 27 27)"/>
              <text x="27" y="31" text-anchor="middle" font-size="10" fill="#90A89C" font-family="-apple-system,sans-serif">未评分</text>
            </svg>
          </div>
          <div>
            <div class="score-label">跟读评分</div>
            <div class="score-hint">完成跟读后<br>自动评分</div>
          </div>
        </div>

        <div class="wave-area" id="phWave"></div>
        <div class="wave-hint">点击任意位置重播</div>
      </div>

      <div class="nav-dots" id="phDots"></div>

      <div class="bottom-actions">
        <div class="btn-solid" onclick="startReading('phToast')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          开始跟读
        </div>
      </div>
      <div class="toast" id="phToast"></div>
    </div>

    <div class="page" id="vocabPage" style="transform:translateX(100%);">
      <div class="topbar">
        <div class="tb-back" onclick="backToPhonetic()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="tb-counter" id="vcCounter">词汇 1 / 5</div>
        <div class="tb-right">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
      </div>

      <div class="content-area" onclick="replayAudio()">
        <div class="assoc-tag" id="vcTag">关联音标：ㄴ</div>
        <div class="vocab-kr" id="vcKr">나무</div>
        <div class="vocab-zh" id="vcZh">树木</div>
        <div class="vocab-roman" id="vcRoman">na-mu</div>
        <div class="wave-area" id="vcWave"></div>
        <div class="wave-hint">点击任意位置重播</div>
      </div>

      <div class="nav-dots" id="vcDots"></div>

      <div class="bottom-actions">
        <div class="btn-solid" onclick="startReading('vcToast')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          开始跟读
        </div>
      </div>
      <div class="toast" id="vcToast"></div>
    </div>

  </div>
</div>

<div style="width:155px;display:flex;flex-direction:column;gap:11px;padding-top:16px;">
  <div style="font-size:11px;color:#90A89C;font-weight:600;letter-spacing:0.5px;">手势操作</div>
  <div onclick="swipeLeft()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.7);border:1px solid #D9EFDF;cursor:pointer;">
    <div style="width:30px;height:30px;border-radius:9px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#0F6E56;font-size:15px;">←</div>
    <div style="font-size:12px;color:#3A6654;line-height:1.4;"><strong style="display:block;color:#0F6E56;font-size:13px;">左滑</strong>关联词汇</div>
  </div>
  <div onclick="swipeRight()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.7);border:1px solid #D9EFDF;cursor:pointer;">
    <div style="width:30px;height:30px;border-radius:9px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#0F6E56;font-size:15px;">→</div>
    <div style="font-size:12px;color:#3A6654;line-height:1.4;"><strong style="display:block;color:#0F6E56;font-size:13px;">右滑</strong>返回详情</div>
  </div>
  <div onclick="swipeUp()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.7);border:1px solid #D9EFDF;cursor:pointer;">
    <div style="width:30px;height:30px;border-radius:9px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#0F6E56;font-size:15px;">↑</div>
    <div style="font-size:12px;color:#3A6654;line-height:1.4;"><strong style="display:block;color:#0F6E56;font-size:13px;">上滑</strong>下一个</div>
  </div>
  <div onclick="swipeDown()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.7);border:1px solid #D9EFDF;cursor:pointer;">
    <div style="width:30px;height:30px;border-radius:9px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#0F6E56;font-size:15px;">↓</div>
    <div style="font-size:12px;color:#3A6654;line-height:1.4;"><strong style="display:block;color:#0F6E56;font-size:13px;">下滑</strong>上一个</div>
  </div>
  <div style="font-size:11px;color:#B0C8BC;text-align:center;line-height:1.5;padding-top:2px;">也可直接在<br>手机屏上滑动</div>
</div>
</div>

<script>
const phonetics = [
  {
    glyph:'ㄱ', roman:'giyeok', tags:['松音','爆破音'],
    tipText:'声带不振动，舌根抵住软腭，气流短暂阻断后爆破释放。',
    tipExtra:'常见词：<span>가방</span><span>고양이</span><span>공부</span>',
    vocabs:[{kr:'가방',zh:'包、书包',roman:'ga-bang'},{kr:'고양이',zh:'猫',roman:'go-yang-i'},{kr:'공부',zh:'学习',roman:'gong-bu'},{kr:'기차',zh:'火车',roman:'gi-cha'}]
  },
  {
    glyph:'ㄴ', roman:'nieun', tags:['松音','鼻音'],
    tipText:'舌尖抵住上齿龈，气流从鼻腔自然流出，不爆破。',
    tipExtra:'常见词：<span>나무</span><span>눈</span><span>남자</span>',
    vocabs:[{kr:'나무',zh:'树木',roman:'na-mu'},{kr:'눈',zh:'眼睛 / 雪',roman:'nun'},{kr:'남자',zh:'男人',roman:'nam-ja'},{kr:'나라',zh:'国家',roman:'na-ra'},{kr:'내일',zh:'明天',roman:'nae-il'}]
  },
  {
    glyph:'ㄷ', roman:'digeut', tags:['松音','爆破音'],
    tipText:'舌尖贴住上牙床，阻断气流后爆破，发音部位比ㄱ靠前。',
    tipExtra:'常见词：<span>다리</span><span>도시</span><span>동생</span>',
    vocabs:[{kr:'다리',zh:'腿 / 桥',roman:'da-ri'},{kr:'도시',zh:'城市',roman:'do-si'},{kr:'동생',zh:'弟弟/妹妹',roman:'dong-saeng'}]
  },
  {
    glyph:'ㄹ', roman:'rieul', tags:['流音'],
    tipText:'舌尖轻弹上颚，介于 r 和 l 之间，不完全颤音，自然流畅。',
    tipExtra:'常见词：<span>라디오</span><span>물</span><span>달</span>',
    vocabs:[{kr:'라디오',zh:'收音机',roman:'ra-di-o'},{kr:'물',zh:'水',roman:'mul'},{kr:'달',zh:'月亮',roman:'dal'},{kr:'길',zh:'路',roman:'gil'}]
  },
];

let phIdx=1, vcIdx=0, onPhonetic=true, animating=false, starred=false, firstEnter=true;

function buildWave(el, s1, s2, frac) {
  el.innerHTML='';
  const n=40, played=Math.floor(n*frac);
  for(let i=0;i<n;i++){
    const b=document.createElement('div');
    b.className='wave-bar'+(i<played?' played':'');
    b.style.height=Math.round(7+Math.abs(Math.sin(i*0.48+s1)*Math.cos(i*0.3+s2))*24)+'px';
    el.appendChild(b);
  }
}

function buildDots(el, total, active) {
  el.innerHTML='';
  const show=Math.min(total,6);
  for(let i=0;i<show;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===Math.min(active,show-1)?' active':'');
    el.appendChild(d);
  }
}

function renderPhonetic() {
  const p=phonetics[phIdx];
  document.getElementById('phGlyph').textContent=p.glyph;
  document.getElementById('phRoman').textContent=p.roman;
  document.getElementById('phTags').innerHTML=p.tags.map(t=>`<span class="ptag">${t}</span>`).join('');
  document.getElementById('phTipText').textContent=p.tipText;
  document.getElementById('phTipExtra').innerHTML=p.tipExtra;
  document.getElementById('phCounter').textContent=p.glyph+' · 辅音 '+(phIdx+1)+'/'+phonetics.length;
  buildWave(document.getElementById('phWave'),phIdx,1,0.45);
  buildDots(document.getElementById('phDots'),phonetics.length,phIdx);
}

function renderVocab() {
  const p=phonetics[phIdx], v=p.vocabs[vcIdx];
  document.getElementById('vcTag').textContent='关联音标：'+p.glyph;
  document.getElementById('vcKr').textContent=v.kr;
  document.getElementById('vcZh').textContent=v.zh;
  document.getElementById('vcRoman').textContent=v.roman;
  document.getElementById('vcCounter').textContent='词汇 '+(vcIdx+1)+' / '+p.vocabs.length;
  buildWave(document.getElementById('vcWave'),vcIdx+5,phIdx+2,0.35);
  buildDots(document.getElementById('vcDots'),p.vocabs.length,vcIdx);
}

function showToast(id, text) {
  const el=document.getElementById(id);
  el.textContent=text; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function animate(dir, cb) {
  if(animating)return; animating=true;
  const pp=document.getElementById('phoneticPage'), vp=document.getElementById('vocabPage');
  if(dir==='left'||dir==='right'){
    pp.style.transition=vp.style.transition='transform 300ms cubic-bezier(.4,0,.2,1)';
    pp.style.transform=dir==='left'?'translateX(-100%)':'translateX(0)';
    vp.style.transform=dir==='left'?'translateX(0)':'translateX(100%)';
    setTimeout(()=>{cb&&cb();animating=false;},300);
  } else {
    const pg=onPhonetic?pp:vp;
    const oy=dir==='up'?'-55px':'55px', iy=dir==='up'?'55px':'-55px';
    pg.style.transition='transform 180ms ease-in,opacity 180ms';
    pg.style.transform=`translateY(${oy})`; pg.style.opacity='0';
    setTimeout(()=>{
      cb&&cb();
      pg.style.transition='none'; pg.style.transform=`translateY(${iy})`;
      setTimeout(()=>{
        pg.style.transition='transform 220ms ease-out,opacity 200ms';
        pg.style.transform='translateY(0)'; pg.style.opacity='1';
        setTimeout(()=>animating=false,230);
      },20);
    },185);
  }
}

function swipeLeft() {
  if(!onPhonetic){showToast('vcToast','已在关联词汇页');return;}
  vcIdx=0; renderVocab();
  animate('left',()=>{onPhonetic=false;});
  if(firstEnter){firstEnter=false;setTimeout(()=>showToast('vcToast','上下滑动切换词汇 · 右滑返回'),400);}
}
function swipeRight() {
  if(onPhonetic){showToast('phToast','已在音标详情页');return;}
  animate('right',()=>{onPhonetic=true;});
}
function backToPhonetic(){swipeRight();}
function goBack(){showToast('phToast','返回音标首页');}

function swipeUp() {
  if(onPhonetic){
    if(phIdx<phonetics.length-1) animate('up',()=>{phIdx++;vcIdx=0;renderPhonetic();});
    else{showToast('phToast','已是最后一个');animating=false;}
  } else {
    const vocs=phonetics[phIdx].vocabs;
    if(vcIdx<vocs.length-1) animate('up',()=>{vcIdx++;renderVocab();});
    else{showToast('vcToast','已是最后一个');animating=false;}
  }
}
function swipeDown() {
  if(onPhonetic){
    if(phIdx>0) animate('down',()=>{phIdx--;vcIdx=0;renderPhonetic();});
    else{showToast('phToast','已是第一个');animating=false;}
  } else {
    if(vcIdx>0) animate('down',()=>{vcIdx--;renderVocab();});
    else{showToast('vcToast','已是第一个');animating=false;}
  }
}

function toggleStar(){
  starred=!starred;
  document.getElementById('starIcon').setAttribute('fill',starred?'#1D9E75':'none');
  showToast('phToast',starred?'已收藏':'已取消收藏');
}
function startReading(tid){showToast(tid,'开始跟读...');}
function replayAudio(){}

const sc=document.getElementById('screen');
let tx=0,ty=0;
sc.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
sc.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>36) dx<0?swipeLeft():swipeRight();
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>36) dy<0?swipeUp():swipeDown();
},{passive:true});

renderPhonetic();
setTimeout(()=>showToast('phToast','左滑查看关联词汇 · 上下滑切换音标'),600);
</script>
