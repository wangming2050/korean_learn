<meta charset="utf-8">
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>baoyu-design · 韩语音标首页</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh;
  background: #DFE8E2;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 12px;
}
.shell {
  width: 375px; height: 812px; min-height: 812px;
  background: #F4FAF7;
  border-radius: 44px;
  overflow: hidden;
  border: 1.5px solid #ddd;
  margin: 0 auto;
  display: flex; flex-direction: column;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  color: #1A2C24;
  box-shadow: 0 20px 55px rgba(26, 44, 36, 0.18);
}
.status {
  height: 50px; padding: 16px 28px 0;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A2C24; }
.status-icons { font-size: 12px; color: #1A2C24; letter-spacing: 2px; }
.header { padding: 6px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
.header-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #1D9E75; font-weight: 500; margin-bottom: 3px; }
.badge-dot { width: 6px; height: 6px; background: #1D9E75; border-radius: 50%; }
.header-title { font-size: 26px; font-weight: 700; color: #1A2C24; letter-spacing: -0.5px; }
.header-sub { font-size: 13px; color: #90A89C; margin-top: 2px; }
.ai-btn {
  width: 40px; height: 40px; background: #E1F5EE; border-radius: 13px;
  display: flex; align-items: center; justify-content: center; margin-top: 4px;
  flex-shrink: 0;
}
.divider { height: 1px; background: #D9EFDF; margin: 16px 28px 0; flex-shrink: 0; }
.scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding-bottom: 14px;
}
.scroll::-webkit-scrollbar { display: none; }
.section { padding: 16px 28px 0; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; color: #90A89C; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.current-card {
  background: #fff;
  border: 1px solid #D9EFDF;
  border-radius: 18px;
  padding: 15px;
}
.current-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.current-label { font-size: 13px; font-weight: 700; color: #1D9E75; }
.current-main { display: grid; grid-template-columns: 76px 1fr; gap: 14px; align-items: center; }
.letter-box {
  width: 76px; height: 76px; border-radius: 18px;
  background: #F6FBF8;
  border: 1px solid #D9EFDF;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; font-weight: 700; color: #1A2C24;
  box-shadow: inset 0 -8px 20px rgba(29,158,117,0.04);
}
.phonetic-name { font-size: 20px; font-weight: 700; color: #1A2C24; }
.phonetic-name span { font-size: 13px; color: #90A89C; font-weight: 500; margin-left: 7px; }
.phonetic-tag {
  display: inline-flex; padding: 3px 8px; margin-top: 6px;
  background: #E1F5EE; color: #1D9E75;
  border-radius: 8px; font-size: 11px; font-weight: 600;
}
.tip-title { font-size: 12px; color: #4A7A62; font-weight: 600; margin-top: 8px; }
.tip-text { font-size: 12px; color: #6F897D; line-height: 1.5; margin-top: 2px; }
.listen-hint { text-align: center; font-size: 12px; color: #90A89C; margin-top: 10px; }
.action-row { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
.action-btn {
  height: 38px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  font-size: 13px; font-weight: 600;
}
.action-btn.ghost { background: #fff; border: 1px solid #D9EFDF; color: #1D9E75; }
.action-btn.primary { background: #1D9E75; color: #fff; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.tab {
  height: 44px; border-radius: 14px;
  border: 1px solid #D9EFDF;
  background: #fff;
  color: #4A7A62;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.group-title { display: flex; align-items: baseline; gap: 7px; margin-bottom: 10px; }
.group-title strong { font-size: 15px; font-weight: 700; color: #1A2C24; }
.group-title span { font-size: 12px; color: #90A89C; }
.letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.letter-cell {
  height: 54px; border-radius: 14px;
  background: #fff;
  border: 1px solid #D9EFDF;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700; color: #1A2C24;
  position: relative;
}
.letter-cell.active {
  border-color: #1D9E75;
  color: #1D9E75;
  background: #F2FBF7;
}
.letter-cell.active::after {
  content: '';
  position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%; background: #1D9E75;
}
.full-table {
  margin-top: 14px;
  height: 52px;
  border-radius: 16px;
  background: #fff;
  border: 1px solid #D9EFDF;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
.full-table-left { display: flex; align-items: center; gap: 10px; color: #1D9E75; font-size: 14px; font-weight: 600; }
.full-icon {
  width: 32px; height: 32px; border-radius: 10px; background: #E1F5EE;
  display: flex; align-items: center; justify-content: center;
}
.bottom-nav {
  margin-top: auto;
  height: 74px;
  min-height: 74px;
  background: #fff;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid #D9EFDF;
  flex-shrink: 0;
}
.nav-item {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #90A89C;
  cursor: pointer;
}
.nav-item.active { color: #1D9E75; }
.nav-item svg,
.nav-item svg * { stroke: currentColor !important; }
.nav-label { font-size: 11px; line-height: 1; color: currentColor; font-weight: 500; }
</style>

</head>
<body>
<div class="shell">
  <div class="status">
    <span class="status-time">16:30</span>
    <span class="status-icons">▋▋▋ ᯤ ▐</span>
  </div>

  <div class="header">
    <div>
      <div class="header-badge"><span class="badge-dot"></span>Korean AI Learn</div>
      <div class="header-title">韩语音标</div>
      <div class="header-sub">掌握韩文字母和发音规则</div>
    </div>
    <div class="ai-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="8" width="14" height="10" rx="3"/><path d="M12 4v4"/><path d="M9 13h.01M15 13h.01"/><path d="M8 20h8"/>
      </svg>
    </div>
  </div>

  <div class="divider"></div>

  <div class="scroll">
    <div class="section">
      <div class="current-card">
        <div class="current-head">
          <div class="current-label">当前音标</div>
        </div>
        <div class="current-main">
          <div class="letter-box">ㄴ</div>
          <div>
            <div class="phonetic-name">ㄴ <span>| nieun</span></div>
            <div class="phonetic-tag">松音 · 鼻音</div>
            <div class="tip-title">发音提示</div>
            <div class="tip-text">舌尖抵住上齿龈，气流从鼻腔自然流出。</div>
          </div>
        </div>
        <div class="action-row">
          <div class="action-btn primary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 3v18"/><path d="M7 8v8"/><path d="M17 8v8"/></svg>
            开始跟读
          </div>
        </div>
        <div class="listen-hint">点击音标或当前卡片可试听</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">音标分类</div>
      <div class="tabs">
        <div class="tab active">辅音</div>
        <div class="tab">元音</div>
        <div class="tab">收音</div>
        <div class="tab">双元音</div>
      </div>
    </div>

    <div class="section">
      <div class="group-title"><strong>辅音</strong><span>点击音标可播放</span></div>
      <div class="letter-grid">
        <div class="letter-cell">ㄱ</div>
        <div class="letter-cell active">ㄴ</div>
        <div class="letter-cell">ㄷ</div>
        <div class="letter-cell">ㄹ</div>
        <div class="letter-cell">ㅁ</div>
        <div class="letter-cell">ㅂ</div>
        <div class="letter-cell">ㅅ</div>
        <div class="letter-cell">ㅇ</div>
        <div class="letter-cell">ㅈ</div>
        <div class="letter-cell">ㅊ</div>
        <div class="letter-cell">ㅋ</div>
        <div class="letter-cell">ㅌ</div>
        <div class="letter-cell">ㅍ</div>
        <div class="letter-cell">ㅎ</div>
      </div>
      <div class="full-table">
        <div class="full-table-left">
          <div class="full-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>
          </div>
          查看全部音标表
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="nav-label">音标</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#90A89C" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-label">词汇</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#90A89C" stroke-width="1.8" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="nav-label">教材</span>
    </div>
  </div>
</div>
</body>
</html>
