<meta charset="utf-8">


<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
.shell {
  width: 375px; height: 812px; min-height: 812px;
  background: #F4FAF7;
  border-radius: 44px;
  overflow: hidden;
  border: 1.5px solid #ddd;
  margin: 0 auto;
  display: flex; flex-direction: column;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  color: #1A2C24;
}
.status {
  height: 50px; padding: 16px 28px 0;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A2C24; }
.status-icons { font-size: 12px; color: #1A2C24; letter-spacing: 2px; }

.header { padding: 6px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
.header-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #1D9E75; font-weight: 500; margin-bottom: 3px; }
.badge-dot { width: 6px; height: 6px; background: #1D9E75; border-radius: 50%; }
.header-title { font-size: 26px; font-weight: 700; color: #1A2C24; letter-spacing: -0.5px; }
.header-sub { font-size: 13px; color: #90A89C; margin-top: 2px; }
.ai-btn {
  width: 40px; height: 40px; background: #E1F5EE; border-radius: 13px;
  display: flex; align-items: center; justify-content: center; margin-top: 4px;
  flex-shrink: 0;
}

.divider { height: 1px; background: #D9EFDF; margin: 16px 28px 0; flex-shrink: 0; }

.section { padding: 16px 28px 0; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; color: #90A89C; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }

.book-row {
  display: flex; align-items: center; gap: 14px;
  padding: 0 0 14px;
  border-bottom: 1px solid #D9EFDF;
}
.book-cover {
  width: 46px; height: 58px; border-radius: 8px;
  background: #0B2E86;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.book-cover-text {
  color: rgba(255,255,255,0.85); font-size: 8px; font-weight: 700;
  line-height: 1.3; text-align: center; z-index: 1;
}
.book-cover::after {
  content: ''; position: absolute; right: -10px; bottom: -10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.book-info { flex: 1; }
.book-name { font-size: 16px; font-weight: 600; color: #1A2C24; }
.book-meta { font-size: 12px; color: #90A89C; margin-top: 3px; }
.book-arrow {
  width: 28px; height: 28px; background: #E1F5EE; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.action-cell { padding: 16px; border-radius: 16px; }
.action-cell.primary { background: #1D9E75; }
.action-cell.secondary { background: #fff; border: 1px solid #D9EFDF; }
.cell-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cell-label { font-size: 13px; font-weight: 600; }
.action-cell.primary .cell-label { color: rgba(255,255,255,0.9); }
.action-cell.secondary .cell-label { color: #4A7A62; }
.cell-icon {
  width: 28px; height: 28px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.action-cell.primary .cell-icon { background: rgba(255,255,255,0.2); }
.action-cell.secondary .cell-icon { background: #E1F5EE; }
.cell-num { font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
.action-cell.primary .cell-num { color: #fff; }
.action-cell.secondary .cell-num { color: #1A2C24; }
.cell-unit { font-size: 13px; font-weight: 400; margin-left: 2px; }
.action-cell.primary .cell-unit { color: rgba(255,255,255,0.7); }
.action-cell.secondary .cell-unit { color: #90A89C; }
.cell-desc { font-size: 11px; line-height: 1.5; margin-top: 4px; }
.action-cell.primary .cell-desc { color: rgba(255,255,255,0.7); }
.action-cell.secondary .cell-desc { color: #90A89C; }
.cell-btn {
  margin-top: 12px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.action-cell.primary .cell-btn { background: rgba(255,255,255,0.18); color: #fff; }
.action-cell.secondary .cell-btn { background: #E1F5EE; color: #1D9E75; }

.library-block {
  background: #fff; border-radius: 16px; border: 1px solid #D9EFDF;
  overflow: hidden;
}
.lib-head { padding: 14px 16px 12px; border-bottom: 1px solid #EEF7F2; }
.lib-head-row { display: flex; align-items: center; gap: 10px; }
.lib-icon {
  width: 36px; height: 36px; background: #E1F5EE; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.lib-title { font-size: 15px; font-weight: 600; color: #1A2C24; }
.lib-sub { font-size: 12px; color: #90A89C; margin-top: 2px; }
.stats-row { display: flex; }
.stat-item { flex: 1; padding: 12px 0; text-align: center; position: relative; }
.stat-item + .stat-item::before {
  content: ''; position: absolute; left: 0; top: 16px; bottom: 16px;
  width: 1px; background: #EEF7F2;
}
.stat-num { font-size: 20px; font-weight: 700; color: #1A2C24; }
.stat-label { font-size: 11px; color: #90A89C; margin-top: 3px; }
.lib-footer {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid #EEF7F2;
  cursor: pointer;
}
.lib-footer-text { font-size: 14px; font-weight: 500; color: #1D9E75; }
.lib-footer-arrow {
  width: 24px; height: 24px; background: #E1F5EE; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}

.bottom-nav {
  margin-top: auto;
  height: 74px;
  min-height: 74px;
  background: #fff;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid #D9EFDF;
  flex-shrink: 0;
}
.nav-item {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #90A89C;
  cursor: pointer;
}
.nav-item.active { color: #1D9E75; }
.nav-item svg,
.nav-item svg * { stroke: currentColor !important; }
.nav-label { font-size: 11px; line-height: 1; color: currentColor; font-weight: 500; }
</style>
