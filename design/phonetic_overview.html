
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
.outer{display:flex;justify-content:center;padding:16px 8px;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;}
.phone{
  width:320px;height:680px;background:#F4FAF7;
  border-radius:40px;border:1.5px solid #C8E8D8;overflow:hidden;
  position:relative;flex-shrink:0;
  box-shadow:0 16px 48px rgba(26,44,36,0.14);
  display:flex;flex-direction:column;
}

.topbar{
  height:52px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.tb-back{
  width:32px;height:32px;border-radius:10px;
  background:rgba(255,255,255,0.7);border:1px solid #C8E8D8;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.tb-title{font-size:15px;font-weight:700;color:#1A2C24;}
.tb-count{font-size:13px;color:#90A89C;font-weight:500;}

.tabs{
  display:flex;gap:6px;padding:0 20px 12px;
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  color:#90A89C;background:transparent;white-space:nowrap;cursor:pointer;
  transition:all 0.15s;flex-shrink:0;border:1px solid transparent;
}
.tab.active{background:#1D9E75;color:#fff;}

.scroll{
  flex:1;overflow-y:auto;scrollbar-width:none;
  padding:0 20px 16px;
}
.scroll::-webkit-scrollbar{display:none;}

.group{margin-bottom:20px;}
.group-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
}
.group-name{font-size:12px;font-weight:600;color:#1D9E75;letter-spacing:0.5px;}
.group-line{flex:1;height:1px;background:#D9EFDF;}
.group-sub{font-size:11px;color:#90A89C;}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.cell{
  aspect-ratio:1;border-radius:12px;
  background:#fff;border:1px solid #D9EFDF;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;transition:all 0.12s;position:relative;
  overflow:hidden;
}
.cell:active{transform:scale(0.93);background:#E1F5EE;}
.cell.playing{background:#E1F5EE;border-color:#1D9E75;}
.cell-glyph{
  font-size:22px;font-weight:400;color:#1A2C24;line-height:1;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
}
.cell-roman{font-size:9px;color:#90A89C;font-weight:500;letter-spacing:0.2px;}

.cell.playing .cell-glyph{color:#0F6E56;}
.cell.playing .cell-roman{color:#1D9E75;}

.ripple{
  position:absolute;border-radius:50%;
  background:rgba(29,158,117,0.18);
  transform:scale(0);
  animation:rip 0.4s ease-out forwards;
  pointer-events:none;
}
@keyframes rip{to{transform:scale(3);opacity:0;}}

.legend{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:10px 0 2px;flex-shrink:0;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#90A89C;}
.legend-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}

.play-hint{
  position:absolute;bottom:76px;left:50%;transform:translateX(-50%);
  background:#0A3D2B;color:#fff;
  font-size:11px;padding:6px 14px;border-radius:16px;
  white-space:nowrap;opacity:0;
  transition:opacity 0.2s;pointer-events:none;z-index:10;
}
.play-hint.show{opacity:1;}
</style>

<div class="outer">
<div class="phone">

  <div class="topbar">
    <div class="tb-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="tb-title">音标总表</div>
    <div class="tb-count" id="totalCount">40 个</div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab(this,'all')">全部</div>
    <div class="tab" onclick="switchTab(this,'consonant')">辅音</div>
    <div class="tab" onclick="switchTab(this,'vowel')">元音</div>
    <div class="tab" onclick="switchTab(this,'final')">收音</div>
    <div class="tab" onclick="switchTab(this,'diphthong')">双元音</div>
  </div>

  <div class="scroll" id="scrollArea"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#D9EFDF;border:1px solid #C8E8D8;"></div>
      点击播放发音
    </div>
  </div>

  <div class="play-hint" id="playHint"></div>

</div>
</div>

<script>
const data = {
  consonant: {
    label:'辅音', sub:'14个',
    items:[
      {g:'ㄱ',r:'g/k'},{g:'ㄴ',r:'n'},{g:'ㄷ',r:'d/t'},{g:'ㄹ',r:'r/l'},
      {g:'ㅁ',r:'m'},{g:'ㅂ',r:'b/p'},{g:'ㅅ',r:'s'},{g:'ㅇ',r:'ng'},
      {g:'ㅈ',r:'j'},{g:'ㅊ',r:'ch'},{g:'ㅋ',r:'k'},{g:'ㅌ',r:'t'},
      {g:'ㅍ',r:'p'},{g:'ㅎ',r:'h'},
    ]
  },
  vowel: {
    label:'元音', sub:'10个',
    items:[
      {g:'ㅏ',r:'a'},{g:'ㅑ',r:'ya'},{g:'ㅓ',r:'eo'},{g:'ㅕ',r:'yeo'},
      {g:'ㅗ',r:'o'},{g:'ㅛ',r:'yo'},{g:'ㅜ',r:'u'},{g:'ㅠ',r:'yu'},
      {g:'ㅡ',r:'eu'},{g:'ㅣ',r:'i'},
    ]
  },
  final: {
    label:'收音', sub:'7个',
    items:[
      {g:'ㄱ',r:'k'},{g:'ㄴ',r:'n'},{g:'ㄷ',r:'t'},{g:'ㄹ',r:'l'},
      {g:'ㅁ',r:'m'},{g:'ㅂ',r:'p'},{g:'ㅇ',r:'ng'},
    ]
  },
  diphthong: {
    label:'双元音', sub:'11个',
    items:[
      {g:'ㅐ',r:'ae'},{g:'ㅒ',r:'yae'},{g:'ㅔ',r:'e'},{g:'ㅖ',r:'ye'},
      {g:'ㅘ',r:'wa'},{g:'ㅙ',r:'wae'},{g:'ㅚ',r:'oe'},{g:'ㅝ',r:'wo'},
      {g:'ㅞ',r:'we'},{g:'ㅟ',r:'wi'},{g:'ㅢ',r:'ui'},
    ]
  }
};

const order = ['consonant','vowel','final','diphthong'];
let currentTab = 'all';
let playingCell = null;
let playTimer = null;

function buildGrid(items, containerId) {
  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach((item, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.glyph = item.g;
    cell.dataset.roman = item.r;
    cell.innerHTML = `<div class="cell-glyph">${item.g}</div><div class="cell-roman">${item.r}</div>`;
    cell.onclick = (e) => playSound(cell, item, e);
    grid.appendChild(cell);
  });
  return grid;
}

function buildGroups(types) {
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';
  let total = 0;
  types.forEach(type => {
    const d = data[type];
    total += d.items.length;
    const group = document.createElement('div');
    group.className = 'group';
    group.innerHTML = `
      <div class="group-header">
        <span class="group-name">${d.label}</span>
        <div class="group-line"></div>
        <span class="group-sub">${d.sub}</span>
      </div>
    `;
    group.appendChild(buildGrid(d.items, type));
    area.appendChild(group);
  });
  document.getElementById('totalCount').textContent = total + ' 个';
}

function switchTab(el, type) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = type;
  if (type === 'all') buildGroups(order);
  else buildGroups([type]);
  document.getElementById('scrollArea').scrollTop = 0;
  clearPlaying();
}

function playSound(cell, item, e) {
  clearPlaying();
  cell.classList.add('playing');
  playingCell = cell;

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const rect = cell.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${(rect.width-size)/2}px;top:${(rect.height-size)/2}px;`;
  cell.appendChild(ripple);
  setTimeout(() => ripple.remove(), 450);

  showHint('▶ ' + item.g + '  ' + item.r);

  playTimer = setTimeout(() => {
    cell.classList.remove('playing');
    playingCell = null;
  }, 1200);
}

function clearPlaying() {
  if (playingCell) {
    playingCell.classList.remove('playing');
    playingCell = null;
  }
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
}

function showHint(text) {
  const el = document.getElementById('playHint');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1400);
}

buildGroups(order);
</script>
