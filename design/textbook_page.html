
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.shell{

}
.status{height:50px;padding:16px 28px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.status-time{font-size:15px;font-weight:600;color:#1A2C24;}
.status-icons{font-size:12px;color:#1A2C24;letter-spacing:2px;}

.header{padding:6px 28px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
.header-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:#1D9E75;font-weight:500;margin-bottom:3px;}
.badge-dot{width:6px;height:6px;background:#1D9E75;border-radius:50%;}
.header-title{font-size:26px;font-weight:700;color:#1A2C24;letter-spacing:-0.5px;}
.header-sub{font-size:13px;color:#90A89C;margin-top:2px;}
.upload-btn{
  display:flex;align-items:center;gap:6px;margin-top:8px;
  padding:7px 14px;border-radius:20px;
  border:1.5px solid #1D9E75;background:transparent;
  font-size:13px;font-weight:600;color:#1D9E75;cursor:pointer;flex-shrink:0;
}

.scroll{flex:1;overflow-y:auto;padding:0 28px 16px;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

.library-banner{
  margin-top:16px;
  background:#fff;border-radius:16px;border:1px solid #D9EFDF;
  padding:16px;
  display:flex;align-items:center;justify-content:space-between;
}
.lib-left{}
.lib-eyebrow{font-size:11px;color:#90A89C;font-weight:500;letter-spacing:0.5px;margin-bottom:4px;}
.lib-title{font-size:17px;font-weight:700;color:#1A2C24;}
.lib-count{font-size:13px;color:#1D9E75;margin-top:3px;font-weight:500;}
.lib-icon-wrap{
  width:56px;height:56px;background:#E1F5EE;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
}

.section-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-top:22px;margin-bottom:12px;
}
.section-title{font-size:15px;font-weight:700;color:#1A2C24;}
.section-hint{font-size:12px;color:#90A89C;}

.book-item{
  background:#fff;border-radius:16px;border:1px solid #D9EFDF;
  margin-bottom:10px;overflow:hidden;
}
.book-main{display:flex;gap:14px;padding:16px 16px 14px;}
.cover{
  width:52px;height:68px;border-radius:8px;
  flex-shrink:0;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.cover-text{
  color:rgba(255,255,255,0.9);font-size:7.5px;font-weight:700;
  line-height:1.3;text-align:center;position:relative;z-index:1;
}
.cover::after{
  content:'';position:absolute;right:-8px;bottom:-8px;
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.12);
}
.cover-1{background:#0B2E86;}
.cover-2{background:#0F5C3A;}

.book-info{flex:1;min-width:0;}
.book-name-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.book-name{font-size:16px;font-weight:700;color:#1A2C24;}
.book-tag{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;
  flex-shrink:0;
}
.tag-main{background:#E1F5EE;color:#0F6E56;}
.tag-adv{background:#FEF3E2;color:#854F0B;}
.book-meta{font-size:12px;color:#90A89C;margin-bottom:12px;}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.progress-label{font-size:11px;color:#90A89C;}
.progress-pct{font-size:12px;font-weight:600;color:#1D9E75;}
.progress-pct-low{color:#E5924A;}
.progress-track{width:100%;height:4px;background:#E1F5EE;border-radius:2px;overflow:hidden;}
.progress-fill{height:4px;border-radius:2px;background:#1D9E75;}
.progress-fill-low{background:#E5924A;}

.book-more{
  width:28px;height:28px;border-radius:8px;background:#F4FAF7;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
  margin-top:2px;
}

.book-action{
  border-top:1px solid #EEF7F2;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;cursor:pointer;
}
.book-action-text{font-size:14px;font-weight:600;color:#1D9E75;}
.book-action-text.start{color:#E5924A;}
.book-action-arrow{
  width:24px;height:24px;border-radius:7px;
  background:#E1F5EE;display:flex;align-items:center;justify-content:center;
}
.book-action-arrow.start-arr{background:#FEF3E2;}

.ai-bar{
  margin-top:4px;
  background:#fff;border-radius:14px;border:1px solid #D9EFDF;
  padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;

}
.ai-left{display:flex;align-items:center;gap:10px;}
.ai-dot{
  width:32px;height:32px;border-radius:10px;background:#E1F5EE;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ai-text-title{font-size:13px;font-weight:600;color:#1D9E75;}
.ai-text-sub{font-size:11px;color:#90A89C;margin-top:2px;line-height:1.4;}
.ai-arrow{
  width:28px;height:28px;border-radius:8px;background:#E1F5EE;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

.bottom-nav{
  height:74px;background:#fff;display:flex;border-top:1px solid #D9EFDF;flex-shrink:0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;
}
.nav-label{font-size:11px;color:#90A89C;font-weight:500;}
.nav-item.active .nav-label{color:#1D9E75;}
</style>
