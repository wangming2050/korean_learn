<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>baoyu-design · 词汇库列表页</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh;
  background: #DFE8E2;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 12px;
}
.shell {
  width: 375px;
  min-height: 812px;
  background: #F4FAF7;
  border-radius: 44px;
  overflow: hidden;
  border: 1.5px solid #ddd;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  color: #1A2C24;
  box-shadow: 0 20px 55px rgba(26, 44, 36, 0.18);
}
.status {
  height: 50px;
  padding: 16px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A2C24; }
.status-icons { font-size: 12px; color: #1A2C24; letter-spacing: 2px; }
.topbar {
  padding: 6px 28px 0;
  display: grid;
  grid-template-columns: 40px 1fr auto 40px;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}
.back-btn,
.search-btn {
  width: 40px;
  height: 40px;
  background: #E1F5EE;
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.title-wrap { min-width: 0; }
.header-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #1D9E75; font-weight: 500; margin-bottom: 3px; }
.badge-dot { width: 6px; height: 6px; background: #1D9E75; border-radius: 50%; }
.header-title { font-size: 25px; font-weight: 700; color: #1A2C24; letter-spacing: -0.5px; line-height: 1.1; }
.header-sub { font-size: 12px; color: #90A89C; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.immerse-btn {
  height: 36px;
  padding: 0 4px;
  background: transparent;
  color: #1D9E75;
  border-radius: 0;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  box-shadow: none;
}
.divider { height: 1px; background: #D9EFDF; margin: 16px 28px 0; flex-shrink: 0; }
.scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding-bottom: 22px;
}
.scroll::-webkit-scrollbar { display: none; }
.section { padding: 16px 28px 0; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; color: #90A89C; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.filter-row {
  display: flex;
  gap: 9px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 1px;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  height: 38px;
  padding: 0 14px;
  border-radius: 13px;
  border: 1px solid #D9EFDF;
  background: #fff;
  color: #4A7A62;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.filter-chip.active {
  background: #1D9E75;
  color: #fff;
  border-color: #1D9E75;
}
.list-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.list-head strong { font-size: 15px; color: #1A2C24; font-weight: 700; }
.list-head span { font-size: 12px; color: #90A89C; }
.word-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.word-row {
  min-height: 64px;
  border-radius: 17px;
  border: 1px solid #D9EFDF;
  background: #fff;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  position: relative;
}
.word-row.selected {
  background: #fff;
  border-color: #A7DCCB;
  box-shadow: 0 6px 16px rgba(29,158,117,0.08);
}
.word-main { min-width: 0; }
.word-korean {
  font-size: 18px;
  line-height: 1.25;
  font-weight: 700;
  color: #1A2C24;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.word-chinese {
  font-size: 13px;
  color: #6F897D;
  margin-top: 4px;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.word-side {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-pill {
  height: 26px;
  padding: 0 8px;
  border-radius: 9px;
  background: #E1F5EE;
  color: #1D9E75;
  font-size: 11px;
  font-weight: 650;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.status-pill.gray { background: #F2F6F4; color: #90A89C; }
.status-pill.orange { background: #FFF4E8; color: #E5924A; }
.star-btn {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  background: #F6FBF8;
  border: 1px solid #D9EFDF;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #90A89C;
  font-size: 15px;
  font-weight: 700;
}
.star-btn.active { color: #E5924A; background: #FFF4E8; border-color: #F4D4B2; }
</style>
</head>
<body>
<div class="shell">
  <div class="status">
    <span class="status-time">16:30</span>
    <span class="status-icons">▋▋▋ ᯤ ▐</span>
  </div>

  <div class="topbar">
    <div class="back-btn" aria-label="返回">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title-wrap">
      <div class="header-badge"><span class="badge-dot"></span>Korean AI Learn</div>
      <div class="header-title">词汇库</div>
      <div class="header-sub">按词书顺序浏览</div>
    </div>
    <div class="immerse-btn">沉浸刷词</div>
    <div class="search-btn" aria-label="搜索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">词汇筛选</div>
    <div class="filter-row">
      <div class="filter-chip active">全部</div>
      <div class="filter-chip">未学习</div>
      <div class="filter-chip">待复习</div>
      <div class="filter-chip">已掌握</div>
      <div class="filter-chip">收藏</div>
    </div>
  </div>

  <div class="scroll">
    <div class="section">
      <div class="list-head">
        <strong>全部词汇</strong>
        <span>898 个</span>
      </div>
      <div class="word-list">
        <div class="word-row selected">
          <div class="word-main">
            <div class="word-korean">안녕하십니까</div>
            <div class="word-chinese">你好</div>
          </div>
          <div class="word-side">
            <span class="status-pill gray">未学习</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">네</div>
            <div class="word-chinese">是的</div>
          </div>
          <div class="word-side">
            <span class="status-pill gray">未学习</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">저</div>
            <div class="word-chinese">我</div>
          </div>
          <div class="word-side">
            <span class="status-pill orange">待复习</span>
            <span class="star-btn active">★</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">이름</div>
            <div class="word-chinese">姓名</div>
          </div>
          <div class="word-side">
            <span class="status-pill gray">未学习</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">선생님</div>
            <div class="word-chinese">老师</div>
          </div>
          <div class="word-side">
            <span class="status-pill">已掌握</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">씨</div>
            <div class="word-chinese">先生，小姐</div>
          </div>
          <div class="word-side">
            <span class="status-pill gray">未学习</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">학교</div>
            <div class="word-chinese">学校</div>
          </div>
          <div class="word-side">
            <span class="status-pill orange">待复习</span>
            <span class="star-btn active">★</span>
          </div>
        </div>
        <div class="word-row">
          <div class="word-main">
            <div class="word-korean">교실</div>
            <div class="word-chinese">教室</div>
          </div>
          <div class="word-side">
            <span class="status-pill gray">未学习</span>
            <span class="star-btn">☆</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
