<!doctype html>
<!-- 后台管理页模板：/admin/scene、/admin/sentence 共用这一份。 -->
<html lang="zh-CN">
<head>
  <!-- 页面统一使用 utf-8，避免中文和韩文乱码。 -->
  <meta charset="utf-8">
  <!-- 响应式布局需要 viewport。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- JS 会根据当前路径修改标题区域文案。 -->
  <title>韩语学习后台</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
  <header class="admin-topbar">
    <a class="admin-brand" href="/admin/scene" aria-label="后台首页">
      <span>한步</span>
      <strong>内容后台</strong>
    </a>
    <nav class="admin-nav" aria-label="后台导航">
      <a href="/admin/scene" data-admin-page="scene">场景管理</a>
      <a href="/admin/sentence" data-admin-page="sentence">例句管理</a>
      <a href="/">返回用户端</a>
    </nav>
    <button id="logoutBtn" class="admin-logout" type="button">退出</button>
  </header>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <p>ADMIN</p>
      <a href="/admin/scene" data-admin-page="scene">场景管理</a>
      <a href="/admin/sentence" data-admin-page="sentence">例句管理</a>
    </aside>

    <main class="admin-content">
      <section class="page-heading">
        <span id="adminEyebrow">CONTENT</span>
        <h2 id="adminTitle"></h2>
        <p id="adminSubtitle"></p>
      </section>

      <section class="toolbar">
        <label id="sentenceFilterLabel">
          按场景筛选
          <select id="sentenceSceneFilter"></select>
        </label>
      </section>

      <section class="panel">
        <h3 id="formTitle">新增</h3>
        <form id="adminForm"></form>
        <p id="adminMessage" class="message"></p>
      </section>

      <section class="panel">
        <h3>已有数据</h3>
        <div id="adminTable"></div>
      </section>
    </main>
  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
