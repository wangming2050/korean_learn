<!doctype html>
<!-- 这一行声明 HTML5 文档，浏览器会用标准模式渲染页面。 -->
<html lang="zh-CN">
<!-- lang 告诉浏览器页面主要语言是中文，方便无障碍工具和翻译工具识别。 -->
<head>
  <!-- charset 设置字符编码，韩文和中文都需要 utf-8 才能正常显示。 -->
  <meta charset="utf-8">
  <!-- viewport 让页面在手机和电脑上都按设备宽度布局。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- title 是浏览器标签页上显示的标题。 -->
  <title>后台登录</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="login-body">
  <main class="login-panel">
    <div class="login-brand">한步</div>
    <h1>后台登录</h1>
    <p>管理场景与例句内容。</p>
    <form id="loginForm">
      <input name="password" type="password" placeholder="后台密码" required>
      <button type="submit">登录</button>
    </form>
    <p id="loginMessage" class="message"></p>
  </main>
  <script src="/static/js/admin.js"></script>
</body>
</html>
