<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>韩语句子跟读学习</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>韩语句子跟读学习</h1>
      <p>以句子为核心，围绕发音、场景、词汇和教材时间轴练习。</p>
    </div>
    <nav class="tabs" aria-label="页面导航">
      <button class="tab active" data-page="letters">音标</button>
      <button class="tab" data-page="scenes">Scenes</button>
      <button class="tab" data-page="vocabulary">词汇</button>
      <button class="tab" data-page="materials">教材</button>
      <button class="theme-toggle" type="button" aria-label="切换明暗背景" title="切换明暗背景">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2.4M12 19.6V22M4.93 4.93l1.7 1.7M17.37 17.37l1.7 1.7M2 12h2.4M19.6 12H22M4.93 19.07l1.7-1.7M17.37 6.63l1.7-1.7"></path>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.4 14.2A7.8 7.8 0 0 1 9.8 4.6 8 8 0 1 0 19.4 14.2Z"></path>
        </svg>
      </button>
    </nav>
  </header>


  
  <main>
    <audio id="player" controls></audio>

    <section id="letters" class="page active">
      <div class="section-title">
        <h2>40 个韩文字母</h2>
      </div>
      <div id="letterGrid" class="letter-grid"></div>
    </section>


    <!-- <section id="scenes" class="page">
      <div class="section-title">
        <h2>场景句子1</h2>
        <select id="sceneSelect"></select>
      </div>
      <div class="play-options">
        <label><input type="checkbox" id="sentenceLoop"> 单句循环1</label>
        <label><input type="checkbox" id="sentenceSlow"> 慢速播放1</label>
      </div>
      <div id="sentenceList" class="sentence-list"></div>
    </section> -->

<!-- 
<section id="scenes">
  ↓
<script src="/static/js/app.js">
  ↓
DOMContentLoaded
  ↓
initEvents()
  ↓
给 #sceneSelect 绑定 change 事件
  ↓
loadScenes()
  ↓
api("/api/scenes")
  ↓
后端查 scene 表
  ↓
生成 <option>
  ↓
放入 #sceneSelect
  ↓
loadSentences(第一个 scene.id)
  ↓
api("/api/sentences?scene_id=1")
  ↓
后端查 sentence 表
  ↓
生成句子卡片
  ↓
放入 #sentenceList
  ↓
播放按钮读取 #sentenceLoop 和 #sentenceSlow
    

-->

    <section id="scenes" class="page">
      <div class="section-title">
        <h2>Scenes</h2>
        <select id="sceneSelect"></select>
      </div>
      <div class="play-options">
        <label><input type="checkbox" id="sentenceLoop">Sentence Loop</label>
        <label><input type="checkbox" id="sentenceSlow">Slow motion playback</label>
      </div>
      <div id="sentenceList" class="sentence-list"></div>
    </section>



    <section id="vocabulary" class="page">
      <div class="section-title">
        <h2>词汇例句</h2>
        <input id="vocabSearch" type="search" placeholder="搜索韩文或中文">
      </div>
      <div id="vocabList" class="sentence-list"></div>
    </section>

    <section id="materials" class="page">
      <div class="section-title">
        <h2>教材时间轴</h2>
        <select id="materialSelect"></select>
      </div>
      <div class="play-options">
        <label><input type="checkbox" id="materialLoop"> 单句循环</label>
      </div>
      <div id="materialContent" class="sentence-list"></div>
    </section>

  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
